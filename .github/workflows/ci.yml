name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-version:
    name: Read Rust version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Parse Rust version from rust-toolchain.toml
        id: parse
        run: echo "version=$(grep '^channel' rust-toolchain.toml | sed 's/.*\"\(.*\)\"/\1/')" >> "$GITHUB_OUTPUT"

  check:
    name: Check
    needs: rust-version
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Checkout soap-server (path dependency)
        uses: actions/checkout@v4
        with:
          repository: NavistAu/soap-server
          token: ${{ secrets.NAVISTAU_READ_TOKEN }}
          path: soap-server-dep
      - name: Make soap-server available at ../soap-server
        run: ln -s "${{ github.workspace }}/soap-server-dep" "${{ github.workspace }}/../soap-server"
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ needs.rust-version.outputs.version }}
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Check
        run: cargo check --all-targets
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Format
        run: cargo fmt -- --check

  check-linux:
    name: Check (Linux)
    needs: rust-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Checkout soap-server (path dependency)
        uses: actions/checkout@v4
        with:
          repository: NavistAu/soap-server
          token: ${{ secrets.NAVISTAU_READ_TOKEN }}
          path: soap-server-dep
      - name: Make soap-server available at ../soap-server
        run: ln -s "${{ github.workspace }}/soap-server-dep" "${{ github.workspace }}/../soap-server"
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ needs.rust-version.outputs.version }}
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Check
        run: cargo check --all-targets
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Format
        run: cargo fmt -- --check

  test:
    name: Test
    needs: rust-version
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Checkout soap-server (path dependency)
        uses: actions/checkout@v4
        with:
          repository: NavistAu/soap-server
          token: ${{ secrets.NAVISTAU_READ_TOKEN }}
          path: soap-server-dep
      - name: Make soap-server available at ../soap-server
        run: ln -s "${{ github.workspace }}/soap-server-dep" "${{ github.workspace }}/../soap-server"
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ needs.rust-version.outputs.version }}
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --workspace --all-features

  test-linux:
    name: Test (Linux)
    needs: rust-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Checkout soap-server (path dependency)
        uses: actions/checkout@v4
        with:
          repository: NavistAu/soap-server
          token: ${{ secrets.NAVISTAU_READ_TOKEN }}
          path: soap-server-dep
      - name: Make soap-server available at ../soap-server
        run: ln -s "${{ github.workspace }}/soap-server-dep" "${{ github.workspace }}/../soap-server"
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ needs.rust-version.outputs.version }}
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --workspace --all-features
